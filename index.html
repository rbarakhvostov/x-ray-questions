<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медицинский Тренажер: Рентгенология</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b7280;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #e5e7eb;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text-primary);
        }

        .answer-container {
            width: 100%;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            animation: fadeIn 0.3s ease;
        }

        .answer-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 25px;
            font-weight: 500;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn:active { transform: scale(0.96); }

        .btn-primary {
            background-color: var(--accent);
            color: white;
            width: 100%;
        }
        .btn-primary:hover { background-color: var(--accent-hover); }

        .btn-success {
            background-color: var(--success);
            color: white;
            flex: 1;
        }
        .btn-success:hover { background-color: var(--success-hover); }

        .btn-danger {
            background-color: var(--danger);
            color: white;
            flex: 1;
        }
        .btn-danger:hover { background-color: var(--danger-hover); }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-secondary);
            border: 1px solid #d1d5db;
            padding: 10px 20px;
            font-size: 0.9rem;
        }
        .btn-secondary:hover { background-color: #f3f4f6; color: var(--text-primary); }

        .footer-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .hidden { display: none !important; }

        .finished-state {
            text-align: center;
            padding: 40px 20px;
        }
        .finished-state h2 { font-size: 1.8rem; margin-bottom: 15px; color: var(--text-primary); }
        .finished-state p { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 30px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hint {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-top: 15px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .card { padding: 20px; min-height: 200px; }
            .question-text { font-size: 1.1rem; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Рентгенология: Тренажер</h1>
        <div class="stats">
            <span id="progress-text">Вопрос 1 из 580</span>
            <span id="score-text">Знаю: 0</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </header>

    <main class="card" id="card">
        <div id="question-area">
            <div class="question-text" id="question-text">Загрузка...</div>
            <button class="btn btn-primary" id="show-answer-btn">Показать ответ</button>
            
            <div class="answer-container hidden" id="answer-container">
                <div class="answer-text" id="answer-text"></div>
                <div class="controls">
                    <button class="btn btn-danger" id="btn-unknown">Не знаю</button>
                    <button class="btn btn-success" id="btn-known">Знаю</button>
                </div>
            </div>
        </div>

        <div class="finished-state hidden" id="finished-area">
            <h2>Отличная работа! 🎉</h2>
            <p>Вы прошли все вопросы.<br>Ваш результат: <strong id="final-score">0</strong> из <strong id="final-total">0</strong></p>
            <button class="btn btn-primary" id="restart-btn" style="width: auto; padding: 12px 32px;">Начать заново</button>
        </div>
    </main>

    <div class="footer-controls">
        <button class="btn btn-secondary" id="shuffle-btn">🔀 Перемешать</button>
        <button class="btn btn-secondary" id="reset-btn">Сбросить прогресс</button>
    </div>
    
    <div class="hint">Горячие клавиши: Пробел (показать ответ), ← (не знаю), → (знаю)</div>
</div>

// Состояние приложения
let questions = [];
let currentIndex = 0;
let knownCount = 0;
let isAnswerShown = false;

// Элементы DOM
const questionText = document.getElementById('question-text');
const answerText = document.getElementById('answer-text');
const showAnswerBtn = document.getElementById('show-answer-btn');
const answerContainer = document.getElementById('answer-container');
const progressText = document.getElementById('progress-text');
const scoreText = document.getElementById('score-text');
const progressFill = document.getElementById('progress-fill');
const questionArea = document.getElementById('question-area');
const finishedArea = document.getElementById('finished-area');
const finalScore = document.getElementById('final-score');
const finalTotal = document.getElementById('final-total');

// Инициализация
function init() {
    // Перемешиваем вопросы при старте
    shuffleArray(rawData);
    questions = [...rawData];
    currentIndex = 0;
    knownCount = 0;
    isAnswerShown = false;
    
    questionArea.classList.remove('hidden');
    finishedArea.classList.add('hidden');
    
    renderQuestion();
    updateStats();
}

// Перемешивание массива (Fisher-Yates)
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// Отображение текущего вопроса
function renderQuestion() {
    if (currentIndex >= questions.length) {
        showFinished();
        return;
    }
    
    const q = questions[currentIndex];
    questionText.textContent = q.q;
    answerText.textContent = q.a;
    
    // Сброс состояния
    isAnswerShown = false;
    answerContainer.classList.add('hidden');
    showAnswerBtn.classList.remove('hidden');
}

// Показать ответ
function showAnswer() {
    isAnswerShown = true;
    answerContainer.classList.remove('hidden');
    showAnswerBtn.classList.add('hidden');
}

// Обработка ответа
function handleResponse(isKnown) {
    if (!isAnswerShown) return;
    
    if (isKnown) {
        knownCount++;
    }
    
    currentIndex++;
    updateStats();
    renderQuestion();
}

// Обновление статистики
function updateStats() {
    const total = questions.length;
    const current = Math.min(currentIndex + 1, total);
    
    progressText.textContent = `Вопрос ${current} из ${total}`;
    scoreText.textContent = `Знаю: ${knownCount}`;
    
    const progressPercent = (currentIndex / total) * 100;
    progressFill.style.width = `${progressPercent}%`;
}

// Показать экран завершения
function showFinished() {
    questionArea.classList.add('hidden');
    finishedArea.classList.remove('hidden');
    finalScore.textContent = knownCount;
    finalTotal.textContent = questions.length;
    progressFill.style.width = '100%';
    progressText.textContent = 'Завершено';
}

// Обработчики событий
showAnswerBtn.addEventListener('click', showAnswer);
document.getElementById('btn-known').addEventListener('click', () => handleResponse(true));
document.getElementById('btn-unknown').addEventListener('click', () => handleResponse(false));

document.getElementById('shuffle-btn').addEventListener('click', () => {
    shuffleArray(questions);
    currentIndex = 0;
    knownCount = 0;
    init();
});

document.getElementById('reset-btn').addEventListener('click', () => {
    if(confirm('Сбросить текущий прогресс и начать заново?')) {
        init();
    }
});

document.getElementById('restart-btn').addEventListener('click', init);

// Поддержка клавиатуры
document.addEventListener('keydown', (e) => {
    if (questionArea.classList.contains('hidden')) return;
    
    if (e.code === 'Space') {
        e.preventDefault();
        if (!isAnswerShown) showAnswer();
    } else if (e.code === 'ArrowRight') {
        if (isAnswerShown) handleResponse(true);
    } else if (e.code === 'ArrowLeft') {
        if (isAnswerShown) handleResponse(false);
    }
});

// Запуск
init();
</script>
