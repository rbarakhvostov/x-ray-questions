<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Рентгенография</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-container">
      <div class="header">
        <div class="stats-row">
          <div class="stat-item">
            Вопрос: <span id="current-q">1</span> /
            <span id="total-q">589</span>
          </div>
          <div class="stat-item">
            Верно: <span class="stat-correct" id="score-correct">0</span> |
            Ошибок: <span class="stat-wrong" id="score-wrong">0</span>
          </div>
        </div>
        <div class="progress-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <div id="quiz-area">
        <div class="card" id="question-card">
          <div class="question-meta">
            <div class="q-number" id="q-number">Вопрос 1</div>
            <div class="q-type hidden" id="q-type">Несколько вариантов</div>
          </div>
          <div class="question-text" id="q-text">Загрузка...</div>
          <div class="options-list" id="options-list"></div>

          <div class="actions">
            <button class="btn btn-primary" id="check-btn" disabled>
              Проверить
            </button>
            <button class="btn btn-primary hidden" id="next-btn">Далее</button>
          </div>
        </div>
      </div>

      <div id="results-area" class="card results-screen hidden">
        <h2>Тест завершен!</h2>
        <div class="results-score" id="final-score">0%</div>
        <p class="results-message" id="final-message">Отличная работа!</p>
        <div class="actions results-actions">
          <button class="btn btn-primary" id="restart-results-btn">
            Начать заново
          </button>
          <button class="btn btn-secondary" id="shuffle-results-btn">
            Перемешать вопросы
          </button>
        </div>
      </div>

      <div class="global-actions">
        <button class="btn btn-secondary" id="global-restart-btn">
          Начать сначала
        </button>
        <button class="btn btn-secondary" id="global-shuffle-btn">
          Перемешать вопросы
        </button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
