<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Рентгенография: Тренажер</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="questions.js"></script>
    <style>
      :root {
        --bg-color: #f0f4f8;
        --card-bg: #ffffff;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --success: #10b981;
        --success-bg: #d1fae5;
        --error: #ef4444;
        --error-bg: #fee2e2;
        --missed: #f59e0b;
        --missed-bg: #fef3c7;
        --text-main: #1e293b;
        --text-secondary: #64748b;
        --border: #e2e8f0;
        --radius: 16px;
        --shadow:
          0 10px 15px -3px rgba(0, 0, 0, 0.05),
          0 4px 6px -2px rgba(0, 0, 0, 0.025);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }

      .app-container {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* Header & Stats */
      .header {
        background: var(--card-bg);
        padding: 16px 20px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .stats-row {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-secondary);
      }

      .stat-item span {
        color: var(--text-main);
      }
      .stat-correct {
        color: var(--success) !important;
      }
      .stat-wrong {
        color: var(--error) !important;
      }

      .progress-container {
        height: 6px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        background: var(--primary);
        width: 0%;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Question Card */
      .card {
        background: var(--card-bg);
        padding: 24px;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        animation: slideUp 0.4s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .question-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      .q-number {
        font-size: 13px;
        font-weight: 700;
        color: var(--primary);
        background: #eff6ff;
        padding: 4px 10px;
        border-radius: 6px;
      }

      .q-type {
        font-size: 12px;
        font-weight: 600;
        color: #d97706;
        background: #fffbeb;
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid #fde68a;
      }

      .question-text {
        font-size: 18px;
        font-weight: 600;
        line-height: 1.5;
        margin-bottom: 24px;
      }

      /* Options */
      .options-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 24px;
      }

      .option {
        padding: 16px;
        border: 2px solid var(--border);
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 15px;
        font-weight: 500;
        position: relative;
      }

      .option:hover:not(.disabled) {
        border-color: var(--primary);
        background: #eff6ff;
      }

      .option.selected {
        border-color: var(--primary);
        background: #eff6ff;
        color: var(--primary-hover);
      }

      .option.correct {
        border-color: var(--success);
        background: var(--success-bg);
        color: #065f46;
      }

      .option.incorrect {
        border-color: var(--error);
        background: var(--error-bg);
        color: #991b1b;
      }

      .option.missed {
        border-color: var(--missed);
        background: var(--missed-bg);
        color: #92400e;
      }

      .option.disabled {
        pointer-events: none;
        opacity: 0.8;
      }

      .option-indicator {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid #cbd5e1;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      /* Checkbox style for multiple choice */
      .option.multiple-choice .option-indicator {
        border-radius: 6px;
      }

      .option.selected .option-indicator {
        border-color: var(--primary);
        background: var(--primary);
      }

      .option.selected .option-indicator::after {
        content: "";
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
      }

      .option.multiple-choice.selected .option-indicator::after {
        border-radius: 2px;
        width: 10px;
        height: 6px;
        border-left: 2px solid white;
        border-bottom: 2px solid white;
        transform: rotate(-45deg) translate(1px, -1px);
        background: transparent;
      }

      .option.correct .option-indicator {
        border-color: var(--success);
        background: var(--success);
      }
      .option.correct .option-indicator::after {
        content: "✓";
        color: white;
        font-size: 12px;
        font-weight: bold;
        border: none;
        transform: none;
        width: auto;
        height: auto;
        background: transparent;
      }

      .option.incorrect .option-indicator {
        border-color: var(--error);
        background: var(--error);
      }
      .option.incorrect .option-indicator::after {
        content: "✕";
        color: white;
        font-size: 12px;
        font-weight: bold;
        border: none;
        transform: none;
        width: auto;
        height: auto;
        background: transparent;
      }

      .option.missed .option-indicator {
        border-color: var(--missed);
        background: var(--missed);
      }
      .option.missed .option-indicator::after {
        content: "!";
        color: white;
        font-size: 12px;
        font-weight: bold;
        border: none;
        transform: none;
        width: auto;
        height: auto;
        background: transparent;
      }

      /* Buttons */
      .actions {
        display: flex;
        gap: 12px;
      }

      .btn {
        flex: 1;
        padding: 16px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      }
      .btn-primary:hover:not(:disabled) {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }
      .btn-primary:disabled {
        background: #cbd5e1;
        color: #94a3b8;
        box-shadow: none;
        cursor: not-allowed;
        transform: none;
      }

      .btn-secondary {
        background: white;
        color: var(--text-main);
        border: 2px solid var(--border);
      }
      .btn-secondary:hover {
        background: #f8fafc;
        border-color: #94a3b8;
      }

      .hidden {
        display: none !important;
      }

      /* Results Screen */
      .results-screen {
        text-align: center;
        padding: 40px 20px;
        animation: slideUp 0.5s ease-out;
      }
      .results-score {
        font-size: 48px;
        font-weight: 800;
        color: var(--primary);
        margin: 20px 0;
      }
      .results-message {
        color: var(--text-secondary);
        margin-bottom: 30px;
        font-size: 16px;
        line-height: 1.6;
      }

      @media (max-width: 480px) {
        body {
          padding: 12px;
        }
        .card {
          padding: 20px;
        }
        .question-text {
          font-size: 17px;
        }
        .option {
          padding: 14px;
          font-size: 14.5px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <div class="header">
        <div class="stats-row">
          <div class="stat-item">
            Вопрос: <span id="current-q">1</span> /
            <span id="total-q">585</span>
          </div>
          <div class="stat-item">
            Верно: <span class="stat-correct" id="score-correct">0</span> |
            Ошибок: <span class="stat-wrong" id="score-wrong">0</span>
          </div>
        </div>
        <div class="progress-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <!-- Quiz Area -->
      <div id="quiz-area">
        <div class="card" id="question-card">
          <div class="question-meta">
            <div class="q-number" id="q-number">Вопрос 1</div>
            <div class="q-type hidden" id="q-type">Несколько вариантов</div>
          </div>
          <div class="question-text" id="q-text">Загрузка...</div>
          <div class="options-list" id="options-list"></div>

          <div class="actions">
            <button class="btn btn-primary" id="check-btn" disabled>
              Проверить
            </button>
            <button class="btn btn-primary hidden" id="next-btn">
              Далее →
            </button>
          </div>
        </div>
      </div>

      <!-- Results Area -->
      <div id="results-area" class="card results-screen hidden">
        <h2>Тест завершен!</h2>
        <div class="results-score" id="final-score">0%</div>
        <p class="results-message" id="final-message">Отличная работа!</p>
        <div class="actions" style="flex-direction: column">
          <button class="btn btn-primary" onclick="restartQuiz(false)">
            Начать заново
          </button>
          <button class="btn btn-secondary" onclick="restartQuiz(true)">
            🔀 Перемешать вопросы
          </button>
        </div>
      </div>

      <!-- Global Shuffle Button (always visible during quiz) -->
      <button
        class="btn btn-secondary"
        id="global-shuffle-btn"
        style="margin-top: 10px"
        onclick="restartQuiz(true)"
      >
        🔀 Перемешать вопросы
      </button>
    </div>

    <script>
      // State
      let state = {
        questions: [],
        currentIndex: 0,
        correctCount: 0,
        wrongCount: 0,
        selectedOptions: [],
        isAnswered: false,
        answeredIndices: new Set(),
      };

      // DOM Elements
      const els = {
        currentQ: document.getElementById("current-q"),
        totalQ: document.getElementById("total-q"),
        scoreCorrect: document.getElementById("score-correct"),
        scoreWrong: document.getElementById("score-wrong"),
        progressBar: document.getElementById("progress-bar"),
        qNumber: document.getElementById("q-number"),
        qType: document.getElementById("q-type"),
        qText: document.getElementById("q-text"),
        optionsList: document.getElementById("options-list"),
        checkBtn: document.getElementById("check-btn"),
        nextBtn: document.getElementById("next-btn"),
        quizArea: document.getElementById("quiz-area"),
        resultsArea: document.getElementById("results-area"),
        finalScore: document.getElementById("final-score"),
        finalMessage: document.getElementById("final-message"),
        globalShuffleBtn: document.getElementById("global-shuffle-btn"),
        questionCard: document.getElementById("question-card"),
      };

      // Utils
      const normalize = (str) => str.trim().toLowerCase();
      const shuffleArray = (array) =>
        [...array].sort(() => Math.random() - 0.5);

      function saveState() {
        localStorage.setItem(
          "radiologyQuizState",
          JSON.stringify({
            questions: state.questions,
            currentIndex: state.currentIndex,
            correctCount: state.correctCount,
            wrongCount: state.wrongCount,
            answeredIndices: [...state.answeredIndices],
          }),
        );
      }

      function loadState() {
        const saved = localStorage.getItem("radiologyQuizState");
        if (saved) {
          const parsed = JSON.parse(saved);
          state.questions = parsed.questions;
          state.currentIndex = parsed.currentIndex;
          state.correctCount = parsed.correctCount;
          state.wrongCount = parsed.wrongCount;
          state.answeredIndices = new Set(parsed.answeredIndices || []);
          return true;
        }
        return false;
      }

      function initQuiz(shuffle = false) {
        if (!loadState() || shuffle) {
          state.questions = shuffle
            ? shuffleArray(rawQuestions)
            : [...rawQuestions];
          state.questions = state.questions.map((q) => ({
            ...q,
            options: shuffleArray(q.options),
          }));
          state.currentIndex = 0;
          state.correctCount = 0;
          state.wrongCount = 0;
          state.answeredIndices = new Set();
        } else {
          // Skip already answered questions on reload
          while (
            state.currentIndex < state.questions.length &&
            state.answeredIndices.has(state.currentIndex)
          ) {
            state.currentIndex++;
          }
          // If all answered, go to results
          if (state.currentIndex >= state.questions.length) {
            showResults();
            return;
          }
        }

        state.selectedOptions = [];
        state.isAnswered = false;

        els.quizArea.classList.remove("hidden");
        els.resultsArea.classList.add("hidden");
        els.globalShuffleBtn.classList.remove("hidden");

        updateStats();
        renderQuestion();
        saveState();
      }

      function updateStats() {
        els.currentQ.textContent = state.currentIndex + 1;
        els.totalQ.textContent = state.questions.length;
        els.scoreCorrect.textContent = state.correctCount;
        els.scoreWrong.textContent = state.wrongCount;
        const progress = (state.currentIndex / state.questions.length) * 100;
        els.progressBar.style.width = `${progress}%`;
      }

      function renderQuestion() {
        const q = state.questions[state.currentIndex];
        const normalizedOptions = q.options.map(normalize);

        const parts = q.correct_answer.split(",").map((p) => normalize(p));
        const matchingParts = parts.filter((p) => normalizedOptions.includes(p));

        const correctAnswers =
          matchingParts.length > 0 ? matchingParts : [normalize(q.correct_answer)];
        const isMultiple = correctAnswers.length > 1;

        // Animation reset
        els.questionCard.style.animation = "none";
        els.questionCard.offsetHeight; // trigger reflow
        els.questionCard.style.animation = "slideUp 0.4s ease-out";

        els.qNumber.textContent = `Вопрос ${q.question_number}`;
        els.qText.textContent = q.question_text;

        if (isMultiple) {
          els.qType.classList.remove("hidden");
          els.qType.textContent = "Выберите несколько вариантов";
        } else {
          els.qType.classList.add("hidden");
        }

        els.optionsList.innerHTML = "";
        state.selectedOptions = [];
        state.isAnswered = false;
        els.checkBtn.disabled = true;
        els.checkBtn.classList.remove("hidden");
        els.nextBtn.classList.add("hidden");

        q.options.forEach((opt) => {
          const div = document.createElement("div");
          div.className = `option ${isMultiple ? "multiple-choice" : ""}`;
          div.innerHTML = `<div class="option-indicator"></div><div>${opt}</div>`;

          div.addEventListener("click", () =>
            handleOptionClick(div, opt, isMultiple),
          );
          els.optionsList.appendChild(div);
        });
      }

      function handleOptionClick(element, text, isMultiple) {
        if (state.isAnswered) return;

        if (isMultiple) {
          if (state.selectedOptions.includes(text)) {
            state.selectedOptions = state.selectedOptions.filter(
              (t) => t !== text,
            );
            element.classList.remove("selected");
          } else {
            state.selectedOptions.push(text);
            element.classList.add("selected");
          }
        } else {
          state.selectedOptions = [text];
          document
            .querySelectorAll(".option")
            .forEach((el) => el.classList.remove("selected"));
          element.classList.add("selected");
        }

        els.checkBtn.disabled = state.selectedOptions.length === 0;
      }

      function checkAnswer() {
        state.isAnswered = true;
        const q = state.questions[state.currentIndex];
        state.answeredIndices.add(state.currentIndex);

        const normalizedOptions = q.options.map(normalize);

        const parts = q.correct_answer.split(",").map((p) => normalize(p));
        const matchingParts = parts.filter((p) => normalizedOptions.includes(p));

        const correctAnswers =
          matchingParts.length > 0 ? matchingParts : [normalize(q.correct_answer)];
        const userAnswers = state.selectedOptions.map(normalize);

        const isCorrect =
          correctAnswers.length === userAnswers.length &&
          correctAnswers.every((ans) => userAnswers.includes(ans));

        if (isCorrect) {
          state.correctCount++;
        } else {
          state.wrongCount++;
        }

        // Visual feedback
        document.querySelectorAll(".option").forEach((el) => {
          el.classList.remove("selected"); // ← УДАЛИТЬ selected перед применением состояния
          el.classList.add("disabled");
          const optText = normalize(
            el.querySelector("div:last-child").textContent,
          );

          const isCorrectOption = correctAnswers.includes(optText);
          const isUserSelected = userAnswers.includes(optText);

          if (isCorrectOption && isUserSelected) {
            el.classList.add("correct");
          } else if (isCorrectOption && !isUserSelected) {
            el.classList.add("missed");
          } else if (!isCorrectOption && isUserSelected) {
            el.classList.add("incorrect");
          }
        });

        updateStats();
        els.checkBtn.classList.add("hidden");
        els.nextBtn.classList.remove("hidden");
        saveState();
      }

      function nextQuestion() {
        state.currentIndex++;
        if (state.currentIndex < state.questions.length) {
          renderQuestion();
          updateStats();
          saveState();
        } else {
          showResults();
        }
        // Clear progress on completion
        if (state.currentIndex >= state.questions.length) {
          localStorage.removeItem("radiologyQuizState");
        }
      }

      function showResults() {
        els.quizArea.classList.add("hidden");
        els.globalShuffleBtn.classList.add("hidden");
        els.resultsArea.classList.remove("hidden");

        const total = state.questions.length;
        const percentage = Math.round((state.correctCount / total) * 100);
        els.finalScore.textContent = `${percentage}%`;

        if (percentage >= 90)
          els.finalMessage.textContent =
            "Превосходно! Вы отлично знаете материал.";
        else if (percentage >= 70)
          els.finalMessage.textContent =
            "Хороший результат! Есть небольшие пробелы.";
        else if (percentage >= 50)
          els.finalMessage.textContent =
            "Неплохо, но стоит повторить некоторые темы.";
        else
          els.finalMessage.textContent =
            "Рекомендуется внимательно изучить теорию и попробовать снова.";
      }

      function restartQuiz(shuffle = false) {
        localStorage.removeItem("radiologyQuizState");
        initQuiz(shuffle);
      }

      // Event Listeners
      els.checkBtn.addEventListener("click", checkAnswer);
      els.nextBtn.addEventListener("click", nextQuestion);

      // Start
      initQuiz();
    </script>
  </body>
</html>
